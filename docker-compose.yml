services:
  postgres:
    image: postgres:16-alpine
    container_name: devsync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devsync
      POSTGRES_PASSWORD: devsync
      POSTGRES_DB: devsync
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: devsync-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: devsync-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: devsync
      MINIO_ROOT_PASSWORD: devsync123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:

